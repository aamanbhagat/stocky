name: Deep financials backfill (manual)

# On-demand deep enrichment across the ENTIRE company universe: runs the
# detailed (Phase B) Yahoo pull for every company so far more pages carry unique
# data — especially the business summary (longSummary) — which is the biggest
# lever to move thin long-tail pages out of "Crawled - currently not indexed".
#
# Intentionally NOT scheduled — nothing runs automatically, so this workflow can
# never fail on its own. Trigger it yourself from the Actions tab when you want a
# refresh. Requires the repo secrets DATABASE_URL + TURSO_AUTH_TOKEN (the same
# ones the app uses); business descriptions rarely change, so running it once
# now and occasionally thereafter is plenty.

on:
  workflow_dispatch:
    inputs:
      detailTop:
        description: "How many companies get the detailed (Phase B) pull"
        default: "5010"

permissions:
  contents: read

concurrency:
  group: deep-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps (runs prisma generate via postinstall)
        run: pnpm install --frozen-lockfile

      - name: Deep-enrich ALL companies (financials + business summary → Turso)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          DETAIL_TOP: ${{ github.event.inputs.detailTop || '5010' }}
        run: pnpm enrich:fin
