name: Daily SEO blog post

on:
  schedule:
    # Staggered per project (see header) so the shared AI Gateway key (~2 req/min)
    # is never hit by two repos at once. Override this line per repo.
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "How many posts to generate"
        default: "1"

permissions:
  contents: write

concurrency:
  group: blog-daily
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate post(s)
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          BLOG_MODEL: ${{ vars.BLOG_MODEL || 'anthropic/claude-haiku-4.5' }}
          BLOG_COUNT: ${{ github.event.inputs.count || '1' }}
        run: node scripts/generate-blog-post.mjs

      - name: Commit & push
        run: |
          git config user.name "blog-bot"
          git config user.email "blog-bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add content/blog public/blog
            git commit -m "blog: auto-generated post ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No new content."
          fi
