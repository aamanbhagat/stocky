name: Twice-daily stock data refresh

on:
  schedule:
    # Twice a day on weekdays (markets shut on weekends).
    # 04:30 UTC = 10:00 IST — 45 min after NSE/BSE open (09:15 IST).
    - cron: "30 4 * * 1-5"
    # 11:00 UTC = 16:30 IST — 1 hr after NSE/BSE close (15:30 IST) settles.
    - cron: "0 11 * * 1-5"
  workflow_dispatch:
    inputs:
      detailTop:
        description: "How many companies get the detailed (Phase B) pull"
        default: "1500"

permissions:
  contents: read

concurrency:
  group: stock-daily
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps (runs prisma generate via postinstall)
        run: pnpm install --frozen-lockfile

      - name: Refresh financials from Yahoo → Turso
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          DETAIL_TOP: ${{ github.event.inputs.detailTop || '1500' }}
        run: pnpm enrich:fin
